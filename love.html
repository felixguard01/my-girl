<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รางวัล</title>

<!-- ICON -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#ff6b9d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Film's Puppy">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ffd6e7,#fff5f8);
    font-family:'Sarabun',sans-serif;
    padding:80px 20px 40px;
}

.menu-btn{
    position:fixed;
    top:20px;
    left:20px;
    font-size:30px;
    background:white;
    width:50px;
    height:50px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    z-index:1001;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:250px;
    height:100%;
    background:white;
    box-shadow:5px 0 20px rgba(0,0,0,.1);
    transition:.3s;
    padding-top:80px;
    z-index:1000;
}

.sidebar.active{ left:0; }
.sidebar a{
    display:block;
    padding:18px 25px;
    text-decoration:none;
    color:#555;
    font-size:18px;
}
.sidebar a:hover{ background:#ffe6ef; color:#ff4f81; }

.page-title{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#ff4f81;
    margin-bottom:6px;
}

.page-sub{
    text-align:center;
    font-size:14px;
    color:#bbb;
    margin-bottom:28px;
}

.total-count{
    text-align:center;
    font-size:48px;
    font-weight:bold;
    color:#ff4f81;
    line-height:1;
    margin-bottom:4px;
}

.total-label{
    text-align:center;
    font-size:13px;
    color:#ccc;
    margin-bottom:32px;
}

.card{
    background:white;
    border-radius:20px;
    padding:24px 24px 20px;
    margin-bottom:16px;
    box-shadow:0 6px 20px rgba(255,75,129,.08);
    transition:.3s;
}

.card.unlocked{
    box-shadow:0 6px 24px rgba(255,75,129,.25);
    border:2px solid #ffb3cc;
}

.card.used{
    box-shadow:none;
    border:2px solid #e0e0e0;
    opacity:.6;
    filter:grayscale(1);
}

.card-header{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:14px;
}

.card-icon{ font-size:32px; }
.card-info{ flex:1; }

.card-title{
    font-size:16px;
    font-weight:bold;
    color:#555;
}

.card-title.unlocked{ color:#ff4f81; }

.card-target{
    font-size:13px;
    color:#ccc;
}

.card-badge{
    font-size:13px;
    padding:4px 12px;
    border-radius:999px;
    background:#f5f5f5;
    color:#bbb;
}

.card-badge.unlocked{
    background:#ffe6ef;
    color:#ff4f81;
}

.card-badge.used{
    background:#f0f0f0;
    color:#aaa;
}

.progress-wrap{
    background:#f5f5f5;
    border-radius:999px;
    height:10px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,#ff6b9d,#ff4f81);
    border-radius:999px;
    width:0%;
    transition:width .8s ease;
}

.reward-area{
    margin-top:14px;
    display:none;
}

.reward-text{
    padding:14px 16px;
    background:#fff5f8;
    border-radius:12px;
    font-size:16px;
    color:#ff4f81;
    line-height:1.6;
    margin-bottom:10px;
    animation:fadeIn .4s ease;
}

.use-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    background:#ff6b9d;
    color:white;
    font-size:15px;
    font-family:'Sarabun',sans-serif;
    cursor:pointer;
    transition:.2s;
}

.use-btn:hover{ background:#ff4f81; }

.used-label{
    width:100%;
    padding:10px;
    border-radius:12px;
    background:#f0f0f0;
    color:#aaa;
    font-size:15px;
    text-align:center;
    display:none;
}

@keyframes fadeIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">
    <a href="index.html">ปุ่มคิดถึงหมา</a>
    <a href="love.html">รางวัลเจ้าของ</a>
    <a href="wish.html">Felix & Film Anniversary</a>
</div>

<div class="page-title">รางวัลเจ้าของ</div>
<div class="page-sub">กดปุ่มคิดถึงหมาให้ครบเพื่อปลดล็อครางวัล</div>

<div class="total-count" id="totalCount">...</div>
<div class="total-label">ครั้งที่กดทั้งหมด</div>

<div id="cards"></div>

<script>
const SUPABASE_URL = 'https://amwlkhrpzryfbuujdvto.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtd2xraHJwenJ5ZmJ1dWpkdnRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzE5NDAsImV4cCI6MjA5Nzk0Nzk0MH0.d3aPTMkosHossHw3k-8siS3NeAwQQjHR1Lzbxs1TIS8'

const MILESTONES = [
    { at: 50,  icon: '🍖', title: 'ด่านที่ 1', reward: 'เจ้าของได้กินข้าวฟรี 1 มื้อ' },
    { at: 100, icon: '🎬', title: 'ด่านที่ 2', reward: 'เจ้าของได้ดูหนังฟรี 1 รอบ' },
    { at: 200, icon: '', title: 'ด่านที่ 3', reward: 'ได้ชาเขียวมัฉฉะ 1 แก้ว' },
]

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)
let usedRewards = []

function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active")
}

function buildCards(){
    const wrap = document.getElementById('cards')
    MILESTONES.forEach((m, i) => {
        wrap.innerHTML += `
        <div class="card" id="card-${i}">
            <div class="card-header">
                <div class="card-icon" id="icon-${i}">🔒</div>
                <div class="card-info">
                    <div class="card-title" id="title-${i}">${m.title}</div>
                    <div class="card-target">ครบ ${m.at.toLocaleString()} ครั้ง</div>
                </div>
                <div class="card-badge" id="badge-${i}">ล็อค</div>
            </div>
            <div class="progress-wrap">
                <div class="progress-bar" id="bar-${i}"></div>
            </div>
            <div class="reward-area" id="area-${i}">
                <div class="reward-text">${m.reward}</div>
                <button class="use-btn" id="usebtn-${i}" onclick="useReward(${i})">
                    กดใช้รางวัลนี้
                </button>
                <div class="used-label" id="usedlabel-${i}">ใช้ไปแล้ว</div>
            </div>
        </div>`
    })
}

function updateUI(count, used){
    document.getElementById('totalCount').textContent = count.toLocaleString()
    usedRewards = used || []

    MILESTONES.forEach((m, i) => {
        const prev = i === 0 ? 0 : MILESTONES[i-1].at
        const pct = Math.min((count - prev) / (m.at - prev) * 100, 100)
        document.getElementById('bar-'+i).style.width = Math.max(pct, 0) + '%'

        if(count >= m.at){
            document.getElementById('area-'+i).style.display = 'block'
            document.getElementById('icon-'+i).textContent = m.icon
            document.getElementById('title-'+i).classList.add('unlocked')

            if(usedRewards.includes(i)){
                // ใช้ไปแล้ว → เทา
                document.getElementById('card-'+i).classList.remove('unlocked')
                document.getElementById('card-'+i).classList.add('used')
                document.getElementById('badge-'+i).textContent = 'ใช้แล้ว'
                document.getElementById('badge-'+i).className = 'card-badge used'
                document.getElementById('usebtn-'+i).style.display = 'none'
                document.getElementById('usedlabel-'+i).style.display = 'block'
            } else {
                // ปลดล็อคแต่ยังไม่ได้ใช้ → ชมพู
                document.getElementById('card-'+i).classList.add('unlocked')
                document.getElementById('badge-'+i).textContent = 'ปลดล็อคแล้ว'
                document.getElementById('badge-'+i).className = 'card-badge unlocked'
                document.getElementById('usebtn-'+i).style.display = 'block'
                document.getElementById('usedlabel-'+i).style.display = 'none'
            }
        }
    })
}

async function useReward(i){
    if(usedRewards.includes(i)) return
    if(!confirm(`ยืนยันใช้รางวัล "${MILESTONES[i].title}" มั้ย`)) return

    const newUsed = [...usedRewards, i]

    await db
        .from('press_count')
        .update({ used_rewards: newUsed })
        .eq('id', 1)

    usedRewards = newUsed

    // อัปเดต UI ทันที
    document.getElementById('card-'+i).classList.remove('unlocked')
    document.getElementById('card-'+i).classList.add('used')
    document.getElementById('badge-'+i).textContent = 'ใช้แล้ว'
    document.getElementById('badge-'+i).className = 'card-badge used'
    document.getElementById('usebtn-'+i).style.display = 'none'
    document.getElementById('usedlabel-'+i).style.display = 'block'
}

async function loadCount(){
    const { data } = await db
        .from('press_count')
        .select('count, used_rewards')
        .eq('id', 1)
        .single()

    if(data) updateUI(data.count, data.used_rewards)
}

db.channel('reward_channel')
    .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'press_count'
    }, payload => updateUI(payload.new.count, payload.new.used_rewards))
    .subscribe()

buildCards()
loadCount()
</script>

</body>
</html>
