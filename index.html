<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#fff5f8);
    font-family:'Sarabun',sans-serif;
    overflow:hidden;
}

.menu-btn{
    position:fixed;
    top:20px;
    left:20px;
    font-size:30px;
    background:white;
    width:50px;
    height:50px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    z-index:1001;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:250px;
    height:100%;
    background:white;
    box-shadow:5px 0 20px rgba(0,0,0,.1);
    transition:.3s;
    padding-top:80px;
    z-index:1000;
}

.sidebar.active{ left:0; }

.sidebar a{
    display:block;
    padding:18px 25px;
    text-decoration:none;
    color:#555;
    font-size:18px;
    transition:.2s;
}

.sidebar a:hover{ background:#ffe6ef; color:#ff4f81; }

.container{ text-align:center; }

h1{ color:#ff4f81; margin-bottom:15px; }

p{ color:#777; margin-bottom:10px; }

/* ✨ ส่วนแสดงจำนวนครั้ง */
.count-display{
    font-size:48px;
    font-weight:bold;
    color:#ff4f81;
    margin-bottom:5px;
    line-height:1;
}

.count-label{
    font-size:14px;
    color:#bbb;
    margin-bottom:25px;
}

.main-btn{
    border:none;
    padding:15px 35px;
    border-radius:999px;
    background:#ff6b9d;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.main-btn:hover{ transform:scale(1.05); }

.main-btn:disabled{ opacity:.7; cursor:not-allowed; }

.floating-message{
    position:fixed;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    font-size:30px;
    font-weight:bold;
    color:#ff4f81;
    text-align:center;
    pointer-events:none;
    animation:floatUp 3s ease-out forwards;
}

@keyframes floatUp{
    0%{ opacity:0; transform:translate(-50%,30px); }
    20%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%,-180px); }
}
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">
    <a href="index.html">ปุ่มคิดถึงหมา</a>
    <a href="love.html">รางวัลเจ้าของ</a>
    <a href="wish.html">Phase 3</a>
</div>

<div class="container">
    <h1>🐶</h1>
    <p>กดปุ่มนี้เมื่อคิดถึงหมา</p>

    <div class="count-display" id="countDisplay">...</div>
    <div class="count-label">ครั้งที่คิดถึงหมา</div>

    <button class="main-btn" id="loveBtn" onclick="showMessage()">
        กดเมื่อคิดถึงหมา
    </button>
</div>

<script>
// ==============================
// 🔧 ใส่ค่าของคุณตรงนี้
const SUPABASE_URL = 'https://amwlkhrpzryfbuujdvto.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtd2xraHJwenJ5ZmJ1dWpkdnRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNzE5NDAsImV4cCI6MjA5Nzk0Nzk0MH0.d3aPTMkosHossHw3k-8siS3NeAwQQjHR1Lzbxs1TIS8'
// ==============================

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

const messages = [
    "หมาจะอยู่กับเจ้าของตลอดไปนะ",
    "หมาคิดถึงเจ้าของเหมือนกัน",
    "หมาอยากกอดเจ้าของจัง",
    "หมารักเจ้าของ"
]

// โหลดจำนวนตอนเปิดหน้า
async function loadCount(){
    const { data, error } = await db
        .from('press_count')
        .select('count')
        .eq('id', 1)
        .single()

    if (!error && data) {
        document.getElementById('countDisplay').textContent = data.count.toLocaleString()
    }
}

// Real-time subscribe — ทุกคนเห็นพร้อมกัน
db.channel('press_count_changes')
    .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'press_count'
    }, payload => {
        document.getElementById('countDisplay').textContent =
            payload.new.count.toLocaleString()
    })
    .subscribe()

function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active")
}

async function showMessage(){
    const button = document.getElementById("loveBtn")
    button.disabled = true
    button.textContent = "เฟกำลังส่งข้อความ..."

    // เพิ่ม count ใน Supabase
    const { data: current } = await db
        .from('press_count')
        .select('count')
        .eq('id', 1)
        .single()

    if (current) {
        await db
            .from('press_count')
            .update({ count: current.count + 1 })
            .eq('id', 1)
    }

    const randomMessage = messages[Math.floor(Math.random() * messages.length)]

    setTimeout(() => {
        const msg = document.createElement("div")
        msg.className = "floating-message"
        msg.textContent = randomMessage
        document.body.appendChild(msg)

        button.disabled = false
        button.textContent = "กดเมื่อคิดถึงหมา"

        setTimeout(() => msg.remove(), 3000)
    }, 1500)
}

// โหลดค่าเริ่มต้น
loadCount()
</script>

</body>
</html>
