
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#fff5f8);
    font-family:'Sarabun',sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:#ff4f81;
    margin-bottom:15px;
}

p{
    color:#777;
    margin-bottom:25px;
}

button{
    border:none;
    padding:15px 35px;
    border-radius:999px;
    background:#ff6b9d;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

button:disabled{
    opacity:.7;
    cursor:not-allowed;
}

.floating-message{
    position:fixed;
    left:50%;
    bottom:120px;
    transform:translateX(-50%);
    font-size:30px;
    font-weight:bold;
    color:#ff4f81;
    text-align:center;
    pointer-events:none;
    animation:floatUp 3s ease-out forwards;
}

@keyframes floatUp{
    0%{
        opacity:0;
        transform:translate(-50%,30px);
    }

    20%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:translate(-50%,-180px);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🐶</h1>
    <p>กดปุ่มนี้เมื่อคิดถึงหมา</p>

    <button id="loveBtn" onclick="showMessage()">
        💌 กดเมื่อคิดถึงหมา
    </button>
</div>

<script>
const messages = [
    "หมาจะอยู่กับเจ้าของตลอดไปนะ",
    "หมาคิดถึงเจ้าของเหมือนกัน",
    "หมาอยากกอดเจ้าของจัง",
];

function showMessage(){

    const button = document.getElementById("loveBtn");

    button.disabled = true;
    button.textContent = "เฟกำลังส่งข้อความ...";

    const randomMessage =
        messages[Math.floor(Math.random() * messages.length)];

    setTimeout(() => {

        const msg = document.createElement("div");

        msg.className = "floating-message";
        msg.textContent = randomMessage;

        document.body.appendChild(msg);

        button.disabled = false;
        button.textContent = "กดเมื่อคิดถึงหมา";

        setTimeout(() => {
            msg.remove();
        }, 3000);

    }, 1500);
}
</script>

</body>
</html>
